services:
  postgres:
    image: postgres:16-alpine
    container_name: reliable-task-scheduler-postgres
    environment:
      POSTGRES_DB: task_scheduler
      POSTGRES_USER: task_scheduler
      POSTGRES_PASSWORD: task_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./reliable-task-scheduler/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_scheduler -d task_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
